services:
  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build: ./api
    ports:
      - "8090:8090"
    environment:
      QDRANT_URL: http://qdrant:6333
      RAG_API_HOST: 0.0.0.0
      RAG_API_PORT: 8090
    env_file:
      - api/.env
    depends_on:
      - qdrant

volumes:
  qdrant_data:
