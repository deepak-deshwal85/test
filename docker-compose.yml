services:
  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build: ./api
    ports:
      - "8090:8090"
    environment:
      RAG_API_HOST: 0.0.0.0
      RAG_API_PORT: 8090
    env_file:
      - api/.env
    # For Qdrant Cloud: set QDRANT_CLUSTER_ENDPOINT + QDRANT_API_KEY in api/.env
    # and remove depends_on qdrant. For local dev, uncomment below:
    # depends_on:
    #   - qdrant

volumes:
  qdrant_data:
