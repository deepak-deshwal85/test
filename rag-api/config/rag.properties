# Global RAG defaults. Per-client phone config can override rag.backend and qdrant_collection.
#
# Supported backends:
#   xai    - xAI FileSearch (managed cloud collection)
#   qdrant - local Qdrant vector DB via standalone RAG REST API
#
# Qdrant flow:
#   1. Start Qdrant: docker compose up -d qdrant
#   2. Start RAG API: uv run python scripts/run_rag_api.py
#   3. Upload docs: POST /v1/collections/{collection}/documents
#   4. Agent searches via POST /v1/search (text excerpts only, no embeddings in agent)

rag.backend=qdrant
rag.max_results=5

# Embedding API (RAG service only — not used by the voice agent directly)
rag.embedder.provider=openai
rag.embedder.model=text-embedding-3-small
rag.embedder.dimensions=1536

# Persist embeddings on disk so repeat queries skip the OpenAI API.
# Document chunk vectors are already stored in Qdrant at upload time.
rag.embedder.cache.enabled=true
rag.embedder.cache.path=data/embedding_cache.sqlite

rag.qdrant.access=api

# Qdrant + RAG API (server-side)
qdrant.url=http://127.0.0.1:6333
rag.api.base_url=http://127.0.0.1:8090